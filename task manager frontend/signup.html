<!DOCTYPE html>
<html>
<head>
  <title>Signup - Task Manager</title>
  <link rel="stylesheet" href="CSS/style.css">
  <style>
    .card-header {
      text-align: center;
      margin-bottom: 25px;
    }

    .card-header h2 {
      font-size: 28px;
      margin-bottom: 8px;
      color: white;
    }

    .card-subtitle {
      color: rgba(255, 255, 255, 0.6);
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 15px;
    }

    .form-group label {
      display: block;
      font-size: 12px;
      color: #60a5fa;
      margin-bottom: 5px;
      font-weight: 600;
    }

    .form-group input {
      width: 100%;
      padding: 12px;
      border: 1px solid rgba(59, 130, 246, 0.3);
      background: rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      color: white;
      margin: 0;
    }

    .form-group input::placeholder {
      color: rgba(255, 255, 255, 0.5);
    }

    .form-group input:focus {
      outline: none;
      border-color: #60a5fa;
      background: rgba(255, 255, 255, 0.15);
      box-shadow: 0 0 8px rgba(96, 165, 250, 0.3);
    }

    .form-actions button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      border: none;
      border-radius: 8px;
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin: 0;
    }

    .form-actions button:hover {
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(59, 130, 246, 0.4);
    }

    .divider {
      text-align: center;
      color: rgba(255, 255, 255, 0.5);
      font-size: 12px;
      margin: 20px 0;
    }

    .signup-link {
      text-align: center;
      margin-top: 20px;
    }

    .signup-link a {
      color: #60a5fa;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .signup-link a:hover {
      color: white;
      text-decoration: underline;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="card">
    <div class="card-header">
      <h2>📝 Create Account</h2>
      <p class="card-subtitle">Sign up to start managing your tasks</p>
    </div>

    <div class="form-group">
      <label for="name">Full Name</label>
      <input type="text" id="name" placeholder="Enter your full name">
    </div>

    <div class="form-group">
      <label for="email">Email Address</label>
      <input type="email" id="email" placeholder="your.email@example.com">
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="At least 6 characters">
    </div>

    <div class="form-actions">
      <button onclick="signup()">Create Account</button>
    </div>

    <div class="divider">Already have an account?</div>

    <div class="signup-link">
      <a href="login.html">Sign In Instead</a>
    </div>
  </div>
</div>

<script src="JAVA SCRIPT/script.js"></script>
</body>
</html>
