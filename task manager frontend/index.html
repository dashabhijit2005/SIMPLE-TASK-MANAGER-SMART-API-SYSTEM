<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <link rel="stylesheet" href="CSS/style.css">
</head>
<body>

<div class="dashboard">

  <div class="sidebar">
    <h2>Task Manager</h2>
    <p id="welcomeUser"></p>
    <button onclick="logout()">Logout</button>
  </div>

  <div class="main">
    <div class="header-section">
      <h2>Your Tasks</h2>
      <div class="time-greeting" id="timeGreeting"></div>
    </div>

    <h3 id="taskCounter"></h3>

    <div class="task-form">
      <div class="input-with-suggestions">
        <input type="text" id="taskInput" placeholder="✨ Enter task (e.g., 'study', 'gym', 'meeting', 'code')" oninput="showAISuggestions()" onkeypress="if(event.key==='Enter')addTask()">
        <button onclick="addTask()" title="Add Task">➕ Add</button>
      </div>
      <div id="suggestionPanel" class="suggestion-panel hidden">
        <div class="suggestion-header">🤖 AI Suggestions</div>
        <div id="suggestionList" class="suggestion-list"></div>
      </div>
    </div>

    <div class="control-panel">
      <div class="search-section">
        <input type="text" id="searchInput" placeholder="🔍 Search tasks..." oninput="performSearch()">
      </div>
      <div class="filter-and-sort">
        <div class="filters">
          <button onclick="filterTasks('all')" class="filter-btn active">All</button>
          <button onclick="filterTasks('pending')" class="filter-btn">⏳ Pending</button>
          <button onclick="filterTasks('completed')" class="filter-btn">✅ Completed</button>
        </div>
        <div class="sort-options">
          <button onclick="sortBy('priority')" class="sort-btn">🔴 By Priority</button>
          <button onclick="sortBy('category')" class="sort-btn">📁 By Category</button>
          <button onclick="sortBy('date')" class="sort-btn">📅 By Date</button>
        </div>
      </div>
    </div>

    <ul id="taskList" class="task-list"></ul>
  </div>

</div>

<!-- Edit Task Modal -->
<div id="editModal" class="modal hidden">
  <div class="modal-content">
    <div class="modal-header">
      <h2>✏️ Edit Task</h2>
      <button class="close-btn" onclick="closeEditModal()">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label for="editTaskTitle">Task Title</label>
        <input type="text" id="editTaskTitle" placeholder="Enter task title">
      </div>
      <div class="form-group">
        <label for="editTaskDescription">Description</label>
        <textarea id="editTaskDescription" placeholder="Enter task description" rows="3"></textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="editTaskCategory">Category</label>
          <select id="editTaskCategory">
            <option value="General">General</option>
            <option value="Work">Work</option>
            <option value="Education">Education</option>
            <option value="Fitness">Fitness</option>
            <option value="Health">Health</option>
            <option value="Personal">Personal</option>
            <option value="Learning">Learning</option>
            <option value="Creative">Creative</option>
            <option value="Social">Social</option>
          </select>
        </div>
        <div class="form-group">
          <label for="editTaskPriority">Priority</label>
          <select id="editTaskPriority">
            <option value="Low">🟢 Low</option>
            <option value="Medium">🔵 Medium</option>
            <option value="High">🔴 High</option>
          </select>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeEditModal()">Cancel</button>
      <button class="btn-save" onclick="saveEditTask()">Save Changes</button>
    </div>
  </div>
</div>

<script src="JAVA SCRIPT/script.js"></script>
</body>
</html>
